site_name: dspyer
site_description: "Reliable, optimizable LLM steps with zero DSPy boilerplate: typed outputs, automatic self-correction, and one-call prompt tuning."
site_author: theramkm
site_url: https://theramkm.github.io/dspyer/

theme:
  name: material
  palette:
    # Light mode color palette
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode color palette
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: emerald
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Outfit
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - md_in_html

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [.]
          options:
            show_source: true
            show_root_heading: true
            show_category_heading: true
            inherited_members: true

nav:
  - Introduction: index.md
  - Getting Started: getting-started.md
  - Reliable Outputs (Decorators): decorators.md
  - Observability & Debugging: storage.md
  - Graphs & State: state.md
  - Async & Streaming: async-streaming.md
  - API Reference: api.md
