<svg viewBox="0 0 960 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Fonts Import -->
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&amp;family=Outfit:wght@400;500;700&amp;display=swap');
      
      .title-text { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 30px; fill: url(#grad-header); }
      .subtitle-text { font-family: 'Outfit', sans-serif; font-weight: 400; font-size: 15px; fill: #94A3B8; }
      .section-title { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 0.15em; }
      .body-font { font-family: 'Outfit', sans-serif; }
      .code-font { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    </style>

    <!-- Gradients -->
    <linearGradient id="grad-header" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="50%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>

    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#080B11"/>
      <stop offset="1" stop-color="#04060A"/>
    </linearGradient>

    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1D1D35" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#080B11" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
  </defs>

  <!-- Background Base -->
  <rect width="960" height="480" rx="14" fill="url(#bg)"/>
  <circle cx="480" cy="240" r="450" fill="url(#bg-glow)" />
  <rect x="0.5" y="0.5" width="959" height="479" rx="14" fill="none" stroke="#1F2937" stroke-width="1"/>

  <!-- Tech Grid Overlay -->
  <g opacity="0.02" stroke="#FFFFFF" stroke-width="1">
    <path d="M 0,60 L 960,60 M 0,120 L 960,120 M 0,180 L 960,180 M 0,240 L 960,240 M 0,300 L 960,300 M 0,360 L 960,360 M 0,420 L 960,420" />
    <path d="M 120,0 L 120,480 M 240,0 L 240,480 M 360,0 L 360,480 M 480,0 L 480,480 M 600,0 L 600,480 M 720,0 L 720,480 M 840,0 L 840,480" />
  </g>

  <!-- Wordmark + Tagline -->
  <g transform="translate(44, 62)">
    <text class="title-text" x="0" y="0">⚡ dspyer</text>
    <text class="subtitle-text" x="145" y="-5">Reliable, optimizable LLM steps with zero DSPy boilerplate.</text>
  </g>

  <!-- LEFT: The code you write -->
  <text class="section-title" x="44" y="148" fill="#8B5CF6">YOU WRITE</text>
  <rect x="44" y="160" width="392" height="252" rx="10" fill="#0C1017" stroke="#3A2C5D" stroke-width="1.5"/>
  <g class="code-font" font-size="13.5">
    <text x="66" y="194" fill="#10B981">@self_correcting<tspan fill="#94A3B8">(</tspan><tspan fill="#F59E0B">max_retries</tspan><tspan fill="#94A3B8">=</tspan><tspan fill="#A78BFA">3</tspan><tspan fill="#94A3B8">)</tspan></text>
    <text x="66" y="218" fill="#3B82F6">def <tspan fill="#F8FAFC">answer</tspan><tspan fill="#94A3B8">(question: </tspan><tspan fill="#10B981">str</tspan><tspan fill="#94A3B8">) -&gt; </tspan><tspan fill="#10B981">Answer</tspan><tspan fill="#94A3B8">:</tspan></text>
    <text x="90" y="240" fill="#64748B">"""Answer and cite your sources."""</text>
    <text x="90" y="262" fill="#94A3B8">...</text>
  </g>
  <line x1="66" y1="294" x2="414" y2="294" stroke="#1E293B" stroke-width="1"/>
  <g class="code-font" font-size="12.5" fill="#64748B">
    <text x="66" y="320"># a normal typed function.</text>
    <text x="66" y="340"># dspyer enforces the schema,</text>
    <text x="66" y="360"># self-corrects on failure, and</text>
    <text x="66" y="380"># stays an optimizable dspy.Module.</text>
  </g>

  <!-- Arrow Transition -->
  <g>
    <line x1="448" y1="286" x2="506" y2="286" stroke="url(#accent)" stroke-width="2"/>
    <path d="M506 286 l-9 -5 v10 z" fill="#10B981"/>
    <text class="section-title" x="452" y="276" fill="#94A3B8">RUN</text>
  </g>

  <!-- RIGHT: The trace you get back -->
  <text class="section-title" x="520" y="148" fill="#10B981">YOU SEE WHAT HAPPENED</text>
  <rect x="520" y="160" width="396" height="252" rx="10" fill="#0C1017" stroke="#164E3E" stroke-width="1.5"/>

  <g class="code-font" font-size="12">
    <!-- Header line -->
    <text x="540" y="190" fill="#94A3B8">dspyer · answer · 2 attempts · <tspan fill="#10B981">✓ corrected</tspan></text>
    <line x1="540" y1="202" x2="896" y2="202" stroke="#1E293B" stroke-width="1"/>

    <!-- Attempt 1 -->
    <text x="540" y="228" fill="#F8FAFC">attempt 1  <tspan fill="#EF4444">✗ validation failed</tspan></text>
    <text x="558" y="248" fill="#94A3B8">citations <tspan fill="#64748B">→ must cite at least one source</tspan></text>
    <text x="558" y="266" fill="#64748B" font-size="11">got: []</text>

    <!-- Feedback -->
    <text x="540" y="294" fill="#3B82F6">feedback sent → <tspan fill="#94A3B8">"cite at least one source"</tspan></text>

    <!-- Attempt 2 -->
    <text x="540" y="322" fill="#F8FAFC">attempt 2  <tspan fill="#10B981">✓ passed</tspan></text>
    <text x="558" y="342" fill="#94A3B8">citations <tspan fill="#64748B">= ['doc_1']</tspan></text>
    <line x1="540" y1="360" x2="896" y2="360" stroke="#1E293B" stroke-width="1"/>

    <text x="540" y="388" fill="#64748B" font-size="11">$ DSPYER_TRACE=1   ·   the loop you can watch</text>
  </g>

  <!-- Bottom Capability Strip -->
  <g class="body-font" font-size="12" font-weight="600">
    <text x="44" y="448" fill="#3B82F6">Self-correcting<tspan fill="#1F2937">  ·  </tspan><tspan fill="#10B981">Optimizable (DSPy)</tspan><tspan fill="#1F2937">  ·  </tspan><tspan fill="#94A3B8">LangGraph drop-in</tspan><tspan fill="#1F2937">  ·  </tspan><tspan fill="#94A3B8">Observable</tspan><tspan fill="#1F2937">  ·  </tspan><tspan fill="#94A3B8">Local or cloud</tspan></text>
  </g>
</svg>
