name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Run Link Verifier
        run: python3 scripts/verify_links.py

      - name: Verify package installation
        run: uv pip install .

      - name: Run Ruff Linter
        if: ${{ matrix.python-version == '3.10' }}
        run: uv run ruff check .

      - name: Run Ruff Format Check
        if: ${{ matrix.python-version == '3.10' }}
        run: uv run ruff format --check .

      - name: Run Mypy Type Checking
        if: ${{ matrix.python-version == '3.10' }}
        run: uv pip install .[otel] && uv run mypy dspyer tests

      - name: Run Tests
        run: uv run pytest

      - name: Run Hero Demo Check
        run: uv run examples/hero_demo.py

      - name: Run Benchmarks Check
        run: uv run examples/benchmark.py
