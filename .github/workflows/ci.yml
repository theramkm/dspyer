name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Run Link Verifier
        run: python3 scripts/verify_links.py

      - name: Run Doc Snippets Verifier
        run: uv run python3 scripts/verify_doc_snippets.py

      - name: Test Documentation Build
        run: uv run mkdocs build --strict

      - name: Verify package installation
        run: uv pip install .

      - name: Run Ruff Linter
        if: ${{ matrix.python-version == '3.10' }}
        run: uv run ruff check .

      - name: Run Ruff Format Check
        if: ${{ matrix.python-version == '3.10' }}
        run: uv run ruff format --check .

      - name: Run Mypy Type Checking
        if: ${{ matrix.python-version == '3.10' }}
        run: uv pip install .[otel] && uv run mypy dspyer tests examples scripts

      - name: Run Tests
        run: uv run pytest

      - name: Run Hero Demo Check
        run: uv run examples/hero_demo.py

      - name: Run Benchmarks Check
        run: uv run examples/benchmark.py

  auto-tag:
    runs-on: ubuntu-latest
    needs: check-and-test
    permissions:
      contents: write
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get pyproject.toml version
        id: get-version
        run: |
          VERSION=$(grep -m 1 '^version = ' pyproject.toml | cut -d '"' -f 2)
          echo "version=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check-tag
        run: |
          TAG_NAME="${{ steps.get-version.outputs.version }}"
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME already exists. Skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME does not exist. Creating."
          fi

      - name: Create and Push Tag
        if: steps.check-tag.outputs.exists == 'false'
        run: |
          TAG_NAME="${{ steps.get-version.outputs.version }}"
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git tag -a "$TAG_NAME" -m "Automated release tag for $TAG_NAME"
          git push origin "$TAG_NAME"
